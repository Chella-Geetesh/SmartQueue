<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
        }
    </style>
</head>
<body>
    <div class="container login-container">
        <section>
            <h2 style="text-align: center;">Admin Login</h2>
            <div class="tech-line" style="margin-bottom: 20px;"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required value="admin">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required value="admin123">
                </div>
                <button type="submit" class="btn primary-btn">Login</button>
                <p id="error-msg" style="color: red; margin-top: 10px; text-align: center; display: none;"></p>
            </form>
        </section>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('http://localhost:5000/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('adminToken', data.token);
                window.location.href = 'admin.html';
            } else {
                const err = document.getElementById('error-msg');
                err.textContent = data.message;
                err.style.display = 'block';
            }
        });
    </script>
</body>
</html>
